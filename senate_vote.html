<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diverging Vote Bars</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --text: #111111;
      --muted: #666666;
      --border: #ffffff;
      --accent: #c8102e;
      --accent-light: #f3a3b1;
      --max: 1200px;
      --gutter: 24px;
      --section-gap: 40px;
      --card-gap: 24px;
      --radius: 0;
      --shadow: none;
      --font-sans: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      color: var(--text);
      background: var(--bg);
      line-height: 1.45;
    }

    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .wrap {
      width: min(100% - 2 * var(--gutter), var(--max));
      margin-inline: auto;
      padding: 0;
    }

    .hero {
      padding: 56px 0 28px;
    }

    .hero-kicker {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      line-height: 1;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .subhed {
      max-width: 60ch;
      margin: 16px 0 0;
      font-size: 1.125rem;
      color: var(--muted);
    }

    .section {
      padding: 0;
      border-top: 1px solid #000;
    }

    .panel {
      background: var(--panel);
      border: 0;
      border-radius: 0;
      padding: 18px 0;
      margin: 0;
    }

    .controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 14px;
    }

    button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border: 2px solid black;
      background: var(--text);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      border-radius: 0;
      box-shadow: none;
      transition: background 120ms ease, color 120ms ease, border-color 120ms ease;
    }

    button:not(.active) {
      background: #fff;
      color: var(--text);
    }

    button:hover {
      text-decoration: none;
      border-color: var(--accent);
    }

    .legend {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--muted);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .legend-swatch {
      width: 14px;
      height: 14px;
      border: 1px solid #000;
      display: inline-block;
      flex: 0 0 auto;
    }

    .legend-swatch.current {
      background: var(--accent);
    }

    .chart-wrap {
      width: 100%;
      overflow-x: hidden;
    }

    svg {
      width: 100%;
      display: block;
      background: #fff;
    }

    .axis path,
    .axis line {
      stroke: #999;
      shape-rendering: crispEdges;
    }

    .center-line {
      stroke: #000;
      stroke-width: 1;
    }

    .bar-yea {
      fill: #111;
    }

    .bar-no {
      fill: #b3b3b3;
    }

    .bar-yea.highlight {
      fill: var(--accent);
    }

    .bar-no.highlight {
      fill: var(--accent-light);
    }

    .name-label {
      font-size: 12px;
      dominant-baseline: middle;
      fill: var(--text);
    }

    .name-label.highlight {
      fill: var(--accent);
      font-weight: 700;
    }

    .year-label {
      font-size: 12px;
      dominant-baseline: middle;
      fill: var(--muted);
    }

    .value-label {
      font-size: 11px;
      fill: var(--text);
      dominant-baseline: middle;
    }

    .axis-title {
      font-size: 12px;
      fill: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .tooltip {
      position: absolute;
      pointer-events: none;
      background: #fff;
      color: #000;
      border: 1px solid black;
      padding: 10px 12px;
      border-radius: 0;
      font-size: 13px;
      line-height: 1.4;
      max-width: 320px;
      opacity: 0;
      transform: translate(-50%, calc(-100% - 12px));
      transition: opacity 120ms ease;
      white-space: normal;
      z-index: 5;
    }

    @media (max-width: 980px) {
      .hero {
        padding: 40px 0 24px;
      }

      .section {
        padding: 4px 0;
      }
    }

    @media (max-width: 700px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      button {
        width: 100%;
        justify-content: center;
      }

      .subhed {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="hero-kicker">Supreme Court</div>
      <h1>Senate Votes</h1>
    
      <div class="panel">
        <div class="controls">
          <button id="sort-date" class="active" type="button">Date: Early to Late</button>
          <button id="sort-partisanship" type="button">Partisanship: Smallest to Largest</button>
          <button id="view-counts" class="active" type="button">Show Counts</button>
          <button id="view-percent" type="button">Show Percent</button>
        </div>

        <div class="legend">
          <span class="legend-item">
            <span class="legend-swatch current"></span>
            Current justices
          </span>
        </div>

        <div class="chart-wrap" id="chart"></div>
      </div>
    </section>

    <div class="tooltip" id="tooltip"></div>

    <p class="subhed">
      Source: https://www.senate.gov/legislative/nominations/SupremeCourtNominations1789present.html
    </p>
  </div>

  <script>
    const csvPath = "senate_vote_2.csv";

    const HIGHLIGHT_NAMES = new Set([
      "Barrett, Amy Coney",
      "Jackson, Ketanji Brown",
      "Alito, Samuel A., Jr.",
      "Sotomayor, Sonia",
      "Kagan, Elena",
      "Gorsuch, Neil M.",
      "Kavanaugh, Brett",
      "Thomas, Clarence",
      "Roberts, John G., Jr."
    ]);

    const chartContainer = d3.select("#chart");
    const tooltip = d3.select("#tooltip");

    let allData = [];
    let currentSort = "partisanship";
    let currentView = "percent";

    d3.csv(csvPath, d => {
      const voteYear = +String(d["Vote Year"] || "").trim();
      const yeaVotes = +String(d["Yea Votes"] || "").replace(/,/g, "").trim();
      const noVotes = +String(d["No Votes"] || "").replace(/,/g, "").trim();
      const justiceName = String(d["Justice Full Name"] || "").trim();
      const totalVotes = yeaVotes + noVotes;

      return {
        voteYear,
        yeaVotes,
        noVotes,
        justiceName,
        totalVotes,
        yeaPct: totalVotes ? (yeaVotes / totalVotes) * 100 : 0,
        noPct: totalVotes ? (noVotes / totalVotes) * 100 : 0,
        margin: Math.abs(yeaVotes - noVotes)
      };
    })
    .then(data => {
      allData = data.filter(d =>
        !isNaN(d.voteYear) &&
        !isNaN(d.yeaVotes) &&
        !isNaN(d.noVotes) &&
        d.justiceName
      );

      setActiveButton();
      updateChart();

      window.addEventListener("resize", updateChart);
    })
    .catch(error => {
      console.error(error);
      chartContainer.html("<p>Could not load CSV.</p>");
    });

    document.getElementById("sort-date").addEventListener("click", () => {
      currentSort = "date";
      setActiveButton();
      updateChart();
    });

    document.getElementById("sort-partisanship").addEventListener("click", () => {
      currentSort = "partisanship";
      setActiveButton();
      updateChart();
    });

    document.getElementById("view-counts").addEventListener("click", () => {
      currentView = "counts";
      setActiveButton();
      updateChart();
    });

    document.getElementById("view-percent").addEventListener("click", () => {
      currentView = "percent";
      setActiveButton();
      updateChart();
    });

    function setActiveButton() {
      document.getElementById("sort-date").classList.toggle("active", currentSort === "date");
      document.getElementById("sort-partisanship").classList.toggle("active", currentSort === "partisanship");
      document.getElementById("view-counts").classList.toggle("active", currentView === "counts");
      document.getElementById("view-percent").classList.toggle("active", currentView === "percent");
    }

    function getSortedData() {
      const data = [...allData];

 if (currentSort === "partisanship") {
  data.sort((a, b) => {
    const diffA = Math.abs(a.yeaPct - a.noPct);
    const diffB = Math.abs(b.yeaPct - b.noPct);

    return d3.ascending(diffA, diffB) ||
           d3.ascending(a.voteYear, b.voteYear);
  });
} else {
  data.sort((a, b) => d3.ascending(a.voteYear, b.voteYear));
}

      return data;
    }

    function updateChart() {
      renderChart(getSortedData());
    }

    function renderChart(data) {
      chartContainer.html("");

      if (!data.length) {
        chartContainer.append("p").text("No valid rows found.");
        return;
      }

      const wrapWidth = chartContainer.node().clientWidth || 1200;

      const rowHeight = 20;
      const fontSizeName = 12;
      const fontSizeYear = 12;
      const fontSizeValue = 11;

      const maxNameLength = d3.max(data, d => d.justiceName.length) || 10;
      const leftLabelWidth = Math.max(180, Math.min(340, maxNameLength * 7.2));
      const rightLabelWidth = 120;

      const margin = {
        top: 62,
        right: rightLabelWidth,
        bottom: 28,
        left: leftLabelWidth
      };

      const width = Math.max(760, wrapWidth);
      const height = margin.top + margin.bottom + data.length * rowHeight;

      const maxValue = currentView === "percent"
        ? 100
        : d3.max(data, d => Math.max(d.yeaVotes, d.noVotes));

      const x = d3.scaleLinear()
        .domain([-maxValue, maxValue])
        .range([margin.left*1.2, width - margin.right]);

      const y = d3.scaleBand()
        .domain(data.map((d, i) => i))
        .range([margin.top + 18, height - margin.bottom])
        .padding(0.30);

      const svg = chartContainer
        .append("svg")
        .attr("width", width)
        .attr("height", height);

      const xAxis = d3.axisTop(x)
        .tickFormat(d => {
          const v = Math.abs(d);
          return currentView === "percent" ? `${v}%` : v;
        });

      svg.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${margin.top})`)
        .call(xAxis);

      svg.append("line")
        .attr("class", "center-line")
        .attr("x1", x(0))
        .attr("x2", x(0))
        .attr("y1", margin.top + 18)
        .attr("y2", height - margin.bottom);

      svg.append("text")
        .attr("class", "axis-title")
        .attr("x", x(-maxValue / 2))
        .attr("y", margin.top - 18)
        .attr("text-anchor", "middle")
        .text(currentView === "percent" ? "Yea %" : "Yea Votes");

      svg.append("text")
        .attr("class", "axis-title")
        .attr("x", x(maxValue / 2))
        .attr("y", margin.top - 18)
        .attr("text-anchor", "middle")
        .text(currentView === "percent" ? "No %" : "No Votes");

      svg.selectAll(".name-label")
        .data(data)
        .join("text")
        .attr("class", d => HIGHLIGHT_NAMES.has(d.justiceName) ? "name-label highlight" : "name-label")
        .attr("x", margin.left - 14)
        .attr("y", (_, i) => y(i) + y.bandwidth() / 2)
        .attr("text-anchor", "end")
        .style("font-size", `${fontSizeName}px`)
        .text(d => d.justiceName);

      svg.selectAll(".year-label")
        .data(data)
        .join("text")
        .attr("class", "year-label")
        .attr("x", width - margin.right + 12)
        .attr("y", (_, i) => y(i) + y.bandwidth() / 2)
        .attr("text-anchor", "start")
        .style("font-size", `${fontSizeYear}px`)
        .text(d => `${d.voteYear} · ${d.margin}`);

      svg.selectAll(".bar-yea")
        .data(data)
        .join("rect")
        .attr("class", d => HIGHLIGHT_NAMES.has(d.justiceName) ? "bar-yea highlight" : "bar-yea")
        .attr("x", d => {
          const value = currentView === "percent" ? d.yeaPct : d.yeaVotes;
          return x(-value);
        })
        .attr("y", (_, i) => y(i))
        .attr("width", d => {
          const value = currentView === "percent" ? d.yeaPct : d.yeaVotes;
          return x(0) - x(-value);
        })
        .attr("height", y.bandwidth())
        .on("mousemove", (event, d) => {
          showTooltip(
            event,
            d,
            currentView === "percent" ? "Yea %" : "Yea Votes",
            currentView === "percent" ? `${d.yeaPct.toFixed(1)}%` : d.yeaVotes
          );
        })
        .on("mouseleave", hideTooltip);

      svg.selectAll(".bar-no")
        .data(data)
        .join("rect")
        .attr("class", d => HIGHLIGHT_NAMES.has(d.justiceName) ? "bar-no highlight" : "bar-no")
        .attr("x", x(0))
        .attr("y", (_, i) => y(i))
        .attr("width", d => {
          const value = currentView === "percent" ? d.noPct : d.noVotes;
          return x(value) - x(0);
        })
        .attr("height", y.bandwidth())
        .on("mousemove", (event, d) => {
          showTooltip(
            event,
            d,
            currentView === "percent" ? "No %" : "No Votes",
            currentView === "percent" ? `${d.noPct.toFixed(1)}%` : d.noVotes
          );
        })
        .on("mouseleave", hideTooltip);

      svg.selectAll(".yea-label")
        .data(data)
        .join("text")
        .attr("class", "value-label")
        .attr("x", d => {
          const value = currentView === "percent" ? d.yeaPct : d.yeaVotes;
          return x(-value) - 6;
        })
        .attr("y", (_, i) => y(i) + y.bandwidth() / 2)
        .attr("text-anchor", "end")
        .style("font-size", `${fontSizeValue}px`)
        .text(d => currentView === "percent" ? `${d.yeaPct.toFixed(1)}%` : d.yeaVotes);

      svg.selectAll(".no-label")
        .data(data)
        .join("text")
        .attr("class", "value-label")
        .attr("x", d => {
          const value = currentView === "percent" ? d.noPct : d.noVotes;
          return x(value) + 6;
        })
        .attr("y", (_, i) => y(i) + y.bandwidth() / 2)
        .attr("text-anchor", "start")
        .style("font-size", `${fontSizeValue}px`)
        .text(d => currentView === "percent" ? `${d.noPct.toFixed(1)}%` : d.noVotes);
    }

    function showTooltip(event, d, label, value) {
      tooltip
        .style("opacity", 1)
        .style("left", `${event.pageX}px`)
        .style("top", `${event.pageY}px`)
        .html(
          `<strong>${d.justiceName}</strong><br>` +
          `Vote Year: ${d.voteYear}<br>` +
          `Margin: ${d.margin}<br>` +
          `${label}: ${value}`
        );
    }

    function hideTooltip() {
      tooltip.style("opacity", 0);
    }
  </script>
</body>
</html>
