function normalizeStateToken(value) {
  const s = cleanLabel(value).replace(/\./g, "").trim();
  if (!s) return "";

  const upper = s.toUpperCase();
  if (Object.values(STATE_ABBR).includes(upper)) return upper;

  return STATE_ABBR[s] || "";
}

function splitStateValues(value) {
  if (!value) return [];

  return String(value)
    .split(/[,;/]|\band\b/i)
    .map(d => d.trim())
    .filter(Boolean);
}

function getStateTokens(value) {
  return splitStateValues(value)
    .map(normalizeStateToken)
    .filter(Boolean);
}

function isUnknownLikeStateValue(value) {
  const s = String(value || "").trim();
  if (!s) return true;
  if (/unknown/i.test(s)) return true;
  return isMissingValue(s);
}

function getStateFilterTokens(value, field) {
  const tokens = getStateTokens(value);

  if (
    field === "State Where Nominee Read the Law" &&
    !tokens.length &&
    isUnknownLikeStateValue(value)
  ) {
    return [UNKNOWN_STATE_TOKEN];
  }

  return tokens;
}

async function init(data) {
  rows = data
    .map(cleanRow)
    .filter(d => d["Full Name"] && d["Full Name"].trim());

  buildInstitutionAliasMap();
  normalizeInstitutionFields();

  activeFilters = {};

  summaryEl.textContent = "Loading portraits…";
  await preloadPortraitAvailability();

  renderFilters();
  applyFilters();
}

function cleanRow(row) {
  const out = {};

  for (const key in row) {
    const cleanKey = normalizeFieldKey(key);
    let value = row[key] == null ? "" : String(row[key]).trim();

    if (cleanKey === "Recess Appointment?" && value === "") {
      value = "No";
    }

    out[cleanKey] = value;
  }

  return out;
}

function normalizeFieldKey(key) {
  const normalized = String(key || "").replace(/\s+/g, " ").trim();
  return FIELD_ALIASES[normalized] || normalized;
}

function splitInstitutionValues(value) {
  if (!value) return [];

  return String(value)
    .split(";")
    .map(v => v.trim())
    .filter(Boolean);
}

function buildInstitutionAliasMap() {
  institutionAliasMap = {};

  INSTITUTION_FIELDS.forEach(field => {
    institutionAliasMap[field] = new Map();

    rows.forEach(row => {
      splitInstitutionValues(row[field]).forEach(value => {
        const match = value.match(/^(.+?)\s*\(now\s+(.+?)\)$/i);
        if (!match) return;

        const oldName = match[1].trim();
        const newName = match[2].trim();
        const combined = `${newName} (including ${oldName})`;

        institutionAliasMap[field].set(value, combined);
        institutionAliasMap[field].set(oldName, combined);
        institutionAliasMap[field].set(newName, combined);
      });
    });

    if (field === "Undergraduate Institution") {
      [
        "Unknown",
        "Unknown or Unknown or No Undergraduate Education",
        "Unknown or No Undergraduate Education"
      ].forEach(value => {
        institutionAliasMap[field].set(value, "Unknown");
      });
    }
  });
}

function normalizeInstitutionFields() {
  rows.forEach(row => {
    INSTITUTION_FIELDS.forEach(field => {
      const values = splitInstitutionValues(row[field]);
      if (!values.length) return;

      row[field] = values
        .map(value => institutionAliasMap[field]?.get(value) || value)
        .join("; ");
    });
  });
}

function renderFilters() {
  filtersEl.innerHTML = "";

  const availableTabs = Object.entries(FILTERS)
    .map(([sectionKey, fields]) => {
      const visibleFields = fields.filter(field => {
        if (field === PROFESSIONAL_EXPERIENCE_FIELD) {
          return CAREER_FIELDS.some(careerField => rows.some(row => row.hasOwnProperty(careerField)));
        }
        return rows.some(d => d[field]);
      });

      return { sectionKey, fields: visibleFields };
    })
    .filter(tab => tab.fields.length);

  if (!availableTabs.some(tab => tab.sectionKey === activeFilterTab)) {
    activeFilterTab = availableTabs[0]?.sectionKey || "personal";
  }

  const tabs = document.createElement("div");
  tabs.className = "filter-tabs";

  availableTabs.forEach(({ sectionKey, fields }) => {
    const tab = document.createElement("button");
    tab.type = "button";
    tab.className = "filter-tab";
    tab.textContent = LABELS[sectionKey] || sectionKey;

    if (sectionKey === activeFilterTab) {
      tab.classList.add("active");
    }

    if (sectionHasActiveFilters(fields)) {
      tab.classList.add("has-active");
    }

    tab.addEventListener("click", () => {
      activeFilterTab = sectionKey;
      renderFilters();
    });

    tabs.appendChild(tab);
  });

  filtersEl.appendChild(tabs);

  const activeTab = availableTabs.find(tab => tab.sectionKey === activeFilterTab);
  if (!activeTab) return;

  const section = document.createElement("div");
  section.className = "filter-panel";

  activeTab.fields.forEach((field, i) => {
    const details = document.createElement("details");
    details.open = i === 0;

    details.addEventListener("toggle", () => {
    if (!details.open) return;

    section.querySelectorAll("details").forEach(otherDetails => {
      if (otherDetails !== details) {
        otherDetails.open = false;
      }
    });
  });
    const summary = document.createElement("summary");
    summary.textContent = LABELS[field] || field;
    details.appendChild(summary);

    const body = document.createElement("div");
    body.className = "filter-body";

    if (!NUMERIC_FIELDS.has(field) && !STATE_CARTOGRAM_FIELDS.has(field)) {
      body.classList.add("scrollable");
    }

    if (field === PROFESSIONAL_EXPERIENCE_FIELD) {
      body.appendChild(renderProfessionalExperienceFilter());
    } else if (STATE_CARTOGRAM_FIELDS.has(field)) {
      body.appendChild(renderStateCartogramFilter(field));
    } else if (NUMERIC_FIELDS.has(field)) {
      body.appendChild(renderRangeFilter(field));
    } else {
      body.appendChild(renderCheckboxFilter(field));
    }

    details.appendChild(body);
    section.appendChild(details);
  });

  filtersEl.appendChild(section);
}

function sectionHasActiveFilters(fields) {
  return fields.some(field => activeFilters[field]);
}

function renderProfessionalExperienceFilter() {
  const wrap = document.createElement("div");
  const selected = activeFilters[PROFESSIONAL_EXPERIENCE_FIELD] || new Set();

  CAREER_GROUPS.forEach(group => {
    const groupWrap = document.createElement("div");
    groupWrap.className = "professional-group";

    const groupTitle = document.createElement("div");
    groupTitle.className = "professional-group-title";
    groupTitle.textContent = group.label;
    groupWrap.appendChild(groupTitle);

    group.fields.forEach(([field, labelText]) => {
      const countValue = rows.reduce((sum, row) => sum + (isAffirmative(row[field]) ? 1 : 0), 0);

      const label = document.createElement("label");
      label.className = "option";

      const input = document.createElement("input");
      input.type = "checkbox";
      input.checked = selected.has(field);

      input.addEventListener("change", () => {
        if (!activeFilters[PROFESSIONAL_EXPERIENCE_FIELD]) {
          activeFilters[PROFESSIONAL_EXPERIENCE_FIELD] = new Set();
        }

        if (input.checked) {
          activeFilters[PROFESSIONAL_EXPERIENCE_FIELD].add(field);
        } else {
          activeFilters[PROFESSIONAL_EXPERIENCE_FIELD].delete(field);
          if (activeFilters[PROFESSIONAL_EXPERIENCE_FIELD].size === 0) {
            delete activeFilters[PROFESSIONAL_EXPERIENCE_FIELD];
          }
        }

              applyFilters();
      });

      const text = document.createElement("span");
      text.textContent = labelText;

      const count = document.createElement("span");
      count.className = "option-count";
      count.textContent = countValue;

      label.appendChild(input);
      label.appendChild(text);
      label.appendChild(count);
      groupWrap.appendChild(label);
    });

    wrap.appendChild(groupWrap);
  });

  return wrap;
}

function renderCheckboxFilter(field) {
  const wrap = document.createElement("div");
  const counts = new Map();

  rows.forEach(d => {
    if (INSTITUTION_FIELDS.has(field)) {
      splitInstitutionValues(d[field]).forEach(val => {
        counts.set(val, (counts.get(val) || 0) + 1);
      });
    } else {
      const val = d[field] || "";
      if (!val) return;
      counts.set(val, (counts.get(val) || 0) + 1);
    }
  });

  let values = Array.from(counts.keys());

  if (field === "Position ") {
    const priority = ["Chief Justice", "Associate Justice"];

    values.sort((a, b) => {
      const cleanA = cleanLabel(a);
      const cleanB = cleanLabel(b);
      const ai = priority.indexOf(cleanA);
      const bi = priority.indexOf(cleanB);

      if (ai !== -1 || bi !== -1) {
        if (ai === -1) return 1;
        if (bi === -1) return -1;
        return ai - bi;
      }

      const countDiff = counts.get(b) - counts.get(a);
      if (countDiff !== 0) return countDiff;
      return cleanA.localeCompare(cleanB, undefined, { numeric: true });
    });
  } else {
    values.sort((a, b) => {
      const am = isMissingValue(a);
      const bm = isMissingValue(b);
      if (am !== bm) return am ? 1 : -1;

      if (isBinaryField(field)) {
        return binarySortRank(a) - binarySortRank(b);
      }

      const countDiff = counts.get(b) - counts.get(a);
      if (countDiff !== 0) return countDiff;

      return cleanLabel(a).localeCompare(cleanLabel(b), undefined, { numeric: true });
    });
  }

  values.forEach(value => {
    const label = document.createElement("label");
    label.className = "option";

    const input = document.createElement("input");
    input.type = "checkbox";
    input.checked = activeFilters[field]?.has(value) || false;

    input.addEventListener("change", () => {
      if (!activeFilters[field]) activeFilters[field] = new Set();

      if (input.checked) {
        activeFilters[field].add(value);
      } else {
        activeFilters[field].delete(value);
        if (activeFilters[field].size === 0) delete activeFilters[field];
      }

          applyFilters();
    });

    const text = document.createElement("span");
    text.textContent = cleanLabel(value);

    if (
      field === "Position " &&
      (cleanLabel(value) === "Chief Justice" || cleanLabel(value) === "Associate Justice")
    ) {
      text.style.fontWeight = "700";
    }

    const count = document.createElement("span");
    count.className = "option-count";
    count.textContent = counts.get(value);

    label.appendChild(input);
    label.appendChild(text);
    label.appendChild(count);
    wrap.appendChild(label);
  });

  return wrap;
}

function renderRangeFilter(field) {
  const wrap = document.createElement("div");
  wrap.className = "range-slider-wrap";

  const nums = rows
    .map(d => toNumber(d[field], field))
    .filter(v => Number.isFinite(v));

  if (!nums.length) {
    const note = document.createElement("div");
    note.className = "option";
    note.textContent = "No numeric values available";
    wrap.appendChild(note);
    return wrap;
  }

  const min = Math.floor(Math.min(...nums));
  const max = Math.ceil(Math.max(...nums));
  const current = activeFilters[field] || { min, max };

  const values = document.createElement("div");
  values.className = "range-values";

  const minLabel = document.createElement("span");
  const maxLabel = document.createElement("span");

  const slider = document.createElement("div");
  slider.className = "dual-slider";

  const track = document.createElement("div");
  track.className = "slider-track";

  const minSlider = document.createElement("input");
  minSlider.type = "range";
  minSlider.min = min;
  minSlider.max = max;
  minSlider.step = 1;
  minSlider.value = Number.isFinite(current.min) ? current.min : min;

  const maxSlider = document.createElement("input");
  maxSlider.type = "range";
  maxSlider.min = min;
  maxSlider.max = max;
  maxSlider.step = 1;
  maxSlider.value = Number.isFinite(current.max) ? current.max : max;

  function updateTrack() {
    const low = toNumber(minSlider.value);
    const high = toNumber(maxSlider.value);
    const denom = max - min || 1;
    const lowPct = ((low - min) / denom) * 100;
    const highPct = ((high - min) / denom) * 100;

    track.style.background =
      `linear-gradient(to right,
        #ddd 0%,
        #ddd ${lowPct}%,
        #FFCF01 ${lowPct}%,
        #FFCF01 ${highPct}%,
        #ddd ${highPct}%,
        #ddd 100%)`;
  }

  function update() {
    let low = toNumber(minSlider.value);
    let high = toNumber(maxSlider.value);

    if (low > high) {
      if (this === minSlider) {
        high = low;
        maxSlider.value = high;
      } else {
        low = high;
        minSlider.value = low;
      }
    }

    activeFilters[field] = { min: low, max: high };
    if (low === min && high === max) delete activeFilters[field];

    minLabel.textContent = low;
    maxLabel.textContent = high;
    updateTrack();

      applyFilters();
  }

  minSlider.addEventListener("input", update);
  maxSlider.addEventListener("input", update);

  minLabel.textContent = minSlider.value;
  maxLabel.textContent = maxSlider.value;

  slider.appendChild(track);
  slider.appendChild(minSlider);
  slider.appendChild(maxSlider);

  wrap.appendChild(values);
  values.appendChild(minLabel);
  values.appendChild(maxLabel);
  wrap.appendChild(slider);

  updateTrack();
  return wrap;
}

function applyFilters() {
  filtered = rows.filter(row => {
    if (showOnlyServed && !isServedOnCourt(row)) return false;

    for (const [field, filter] of Object.entries(activeFilters)) {
      if (filter instanceof Set) {
        if (field === PROFESSIONAL_EXPERIENCE_FIELD) {
          const selectedExperience = Array.from(filter);
          if (!selectedExperience.some(careerField => isAffirmative(row[careerField]))) return false;
        } else if (STATE_CARTOGRAM_FIELDS.has(field)) {
          const raw = row[field] || "";
          const stateTokens = getStateFilterTokens(raw, field);
          const rawParts = splitStateValues(raw);
          const matchesState = stateTokens.some(v => filter.has(v));
          const matchesRaw = rawParts.some(v => filter.has(v));
          if (!matchesState && !matchesRaw) return false;
        } else if (INSTITUTION_FIELDS.has(field)) {
          const values = splitInstitutionValues(row[field]);
          if (!values.some(v => filter.has(v))) return false;
        } else {
          if (!filter.has(row[field])) return false;
        }
      } else {
        const n = toNumber(row[field], field);
        if (!Number.isFinite(n)) return false;
        if (Number.isFinite(filter.min) && n < filter.min) return false;
        if (Number.isFinite(filter.max) && n > filter.max) return false;
      }
    }

    if (searchTerm) {
      const professionalExperienceText = CAREER_GROUPS
        .flatMap(group => group.fields)
        .filter(([field]) => isAffirmative(row[field]))
        .map(([, label]) => label)
        .join(" ");

      const searchable = [
        row["Full Name"],
        row["Appointing President"],
        professionalExperienceText,
        row["Law School"],
        row["Undergraduate Institution"]
      ].join(" ").toLowerCase();

      if (!searchable.includes(searchTerm)) return false;
    }

    return true;
  });

  renderCards();
}

function renderCards() {
  cardsEl.innerHTML = "";
  cardsEl.classList.toggle("portrait-mode", viewMode === "portraits");

  const visible = filtered;

  summaryEl.textContent =
    `Showing ${visible.length.toLocaleString()} of ${rows.length.toLocaleString()} matching people` +
    (showOnlyServed ? " · served on the Court only" : "");

  renderActiveFilterChips();

  if (viewMode === "portraits") {
    const withPortrait = visible.filter(row => row.__hasPortrait);
    const withoutPortrait = visible.filter(row => !row.__hasPortrait);

    withPortrait.forEach(row => {
      cardsEl.appendChild(renderPortraitCard(row));
    });

    if (withoutPortrait.length) {
      const heading = document.createElement("div");
      heading.className = "missing-portrait-heading";
      heading.textContent =
        `Portrait unavailable (${withoutPortrait.length.toLocaleString()})`;
      cardsEl.appendChild(heading);

      withoutPortrait.forEach(row => {
        cardsEl.appendChild(renderPortraitCard(row, true));
      });
    }

    return;
  }

  visible.forEach(row => {
    cardsEl.appendChild(renderCard(row));
  });
}

function renderActiveFilterChips() {
  activeFilterChipsEl.innerHTML = "";

  const chips = [];

  Object.entries(activeFilters).forEach(([field, filter]) => {
    if (field === PROFESSIONAL_EXPERIENCE_FIELD && filter instanceof Set) {
      Array.from(filter).forEach(careerField => {
        chips.push({
          field,
          value: careerField,
          label: `Experience: ${CAREER_LABEL_BY_FIELD.get(careerField) || careerField}`
        });
      });
      return;
    }

    if (filter instanceof Set) {
      Array.from(filter).forEach(value => {
        chips.push({
          field,
          value,
          label: `${LABELS[field] || field}: ${cleanLabel(value)}`
        });
      });
      return;
    }

    if (
      filter &&
      typeof filter === "object" &&
      Number.isFinite(filter.min) &&
      Number.isFinite(filter.max)
    ) {
      chips.push({
        field,
        value: "__range",
        label: `${LABELS[field] || field}: ${filter.min}–${filter.max}`
      });
    }
  });

  if (!chips.length) {
    activeFilterChipsEl.style.display = "none";
    return;
  }

  activeFilterChipsEl.style.display = "flex";

  chips.forEach(chip => {
    const el = document.createElement("span");
    el.className = "active-filter-chip";

    const text = document.createElement("span");
    text.textContent = chip.label;

    const remove = document.createElement("button");
    remove.type = "button";
    remove.textContent = "×";
    remove.setAttribute("aria-label", `Remove ${chip.label}`);

    remove.addEventListener("click", () => {
      removeActiveFilterChip(chip);
    });

    el.appendChild(text);
    el.appendChild(remove);
    activeFilterChipsEl.appendChild(el);
  });
}
function removeActiveFilterChip(chip) {
  const filter = activeFilters[chip.field];

  if (filter instanceof Set) {
    filter.delete(chip.value);

    if (filter.size === 0) {
      delete activeFilters[chip.field];
    }
  } else {
    delete activeFilters[chip.field];
  }

  renderFilters();
  applyFilters();
}

function renderStateCartogramFilter(field) {
  const wrap = document.createElement("div");
  const stateCounts = new Map();
  let unknownCount = 0;
  const nonUSCounts = new Map();

  rows.forEach(row => {
    const raw = row[field];
    const parts = splitStateValues(raw);
    const tokens = getStateFilterTokens(raw, field);

    if (tokens.includes(UNKNOWN_STATE_TOKEN)) {
      unknownCount += 1;
      return;
    }

    if (!parts.length) return;

    parts.forEach(part => {
      const abbr = normalizeStateToken(part);
      if (abbr) {
        stateCounts.set(abbr, (stateCounts.get(abbr) || 0) + 1);
      } else if (field === "Birth location") {
        nonUSCounts.set(part, (nonUSCounts.get(part) || 0) + 1);
      } else if (
        field === "State Where Nominee Read the Law" &&
        isUnknownLikeStateValue(part)
      ) {
        unknownCount += 1;
      }
    });
  });

  const maxCount = Math.max(...stateCounts.values(), unknownCount, 1);
  const grid = document.createElement("div");
  grid.className = "state-cartogram";

  const byPos = new Map();
  CARTO_POS.forEach(([abbr, col, row]) => {
    byPos.set(`${col},${row}`, abbr);
  });

  for (let r = 0; r < 8; r++) {
    for (let c = 0; c < 12; c++) {
      const abbr = byPos.get(`${c},${r}`);
      const cell = document.createElement("div");

      if (!abbr) {
        cell.className = "state-square empty";
        grid.appendChild(cell);
        continue;
      }

      const count = stateCounts.get(abbr) || 0;
      const selected = activeFilters[field]?.has(abbr);

      cell.className = "state-square";
      if (count > 0) cell.classList.add("has-data");
      if (selected) cell.classList.add("active");

      const opacity = count ? 0.2 + 0.8 * (count / maxCount) : 0;
      cell.style.background = count ? `rgba(57, 149, 178, ${opacity})` : "#eee";
      cell.textContent = abbr;
      cell.title = `${abbr}: ${count}`;

      if (count > 0) {
        cell.addEventListener("click", () => {
          toggleStateCartogramFilter(field, abbr);
        });
      }

      grid.appendChild(cell);
    }
  }

  wrap.appendChild(grid);

  if (field === "State Where Nominee Read the Law" && unknownCount > 0) {
    const extraWrap = document.createElement("div");
    extraWrap.className = "state-extra-wrap";

    const unknownSquare = document.createElement("button");
    unknownSquare.type = "button";
    unknownSquare.className = "state-extra-square";
    unknownSquare.textContent = "UNK";
    unknownSquare.title = `Unknown: ${unknownCount}`;

    if (activeFilters[field]?.has(UNKNOWN_STATE_TOKEN)) {
      unknownSquare.classList.add("active");
    }

    const opacity = 0.2 + 0.8 * (unknownCount / maxCount);
    unknownSquare.style.background = `rgba(57, 149, 178, ${opacity})`;

    unknownSquare.addEventListener("click", () => {
      toggleStateCartogramFilter(field, UNKNOWN_STATE_TOKEN);
    });

    extraWrap.appendChild(unknownSquare);
    wrap.appendChild(extraWrap);
  }

  if (field === "Birth location" && nonUSCounts.size) {
    const nonUSWrap = document.createElement("div");
    nonUSWrap.className = "non-us-wrap";

    Array.from(nonUSCounts.keys())
      .sort((a, b) => a.localeCompare(b))
      .forEach(value => {
        const label = document.createElement("label");
        label.className = "option";

        const input = document.createElement("input");
        input.type = "checkbox";
        input.checked = activeFilters[field]?.has(value) || false;

        input.addEventListener("change", () => {
          if (!activeFilters[field]) activeFilters[field] = new Set();

          if (input.checked) {
            activeFilters[field].add(value);
          } else {
            activeFilters[field].delete(value);
            if (activeFilters[field].size === 0) delete activeFilters[field];
          }

                  applyFilters();
        });

        const text = document.createElement("span");
        text.textContent = cleanLabel(value);

        const count = document.createElement("span");
        count.className = "option-count";
        count.textContent = nonUSCounts.get(value);

        label.appendChild(input);
        label.appendChild(text);
        label.appendChild(count);
        nonUSWrap.appendChild(label);
      });

    wrap.appendChild(nonUSWrap);
  }

  return wrap;
}

function toggleStateCartogramFilter(field, token) {
  if (!activeFilters[field]) activeFilters[field] = new Set();

  if (activeFilters[field].has(token)) {
    activeFilters[field].delete(token);
    if (activeFilters[field].size === 0) delete activeFilters[field];
  } else {
    activeFilters[field].add(token);
  }

  renderFilters();
  applyFilters();
}


function preloadPortraitAvailability() {
  return Promise.all(
    rows.map(row => new Promise(resolve => {
      const fullName = (row["Full Name"] || "").trim();

      if (!fullName) {
        row.__hasPortrait = false;
        resolve();
        return;
      }

      const img = new Image();

      img.onload = () => {
        row.__hasPortrait = true;
        resolve();
      };

      img.onerror = () => {
        row.__hasPortrait = false;
        resolve();
      };

      img.src = getPortraitPath(fullName);
    }))
  );
}

function getPortraitPath(fullName) {
  const filename = `${fullName}.png`;
  return `portraits_nobg/${encodeURIComponent(filename)}`;
}

function renderPortraitCard(row, isMissingPortrait = false) {
  const card = document.createElement("div");
  card.className = isMissingPortrait
    ? "card portrait-card missing-portrait-card"
    : "card portrait-card";

  const fullName = (row["Full Name"] || "").trim();

  const portrait = document.createElement("img");
  portrait.className = "portrait-large";
  portrait.src = isMissingPortrait
    ? "portraits/placeholder.png"
    : getPortraitPath(fullName);
  portrait.alt = fullName;

  portrait.onerror = function () {
    this.onerror = null;
    this.src = "portraits/placeholder.png";
  };

  const tooltip = document.createElement("div");
  tooltip.className = "portrait-tooltip";
  tooltip.textContent = cleanLabel(fullName || "Unnamed");

  card.appendChild(portrait);
  card.appendChild(tooltip);
  return card;
}

function renderCard(row) {
  const card = document.createElement("div");
  card.className = "card";

  const top = document.createElement("div");
  top.className = "card-top";

  const portrait = document.createElement("img");
  portrait.className = "portrait";

  const fullName = (row["Full Name"] || "").trim();
  portrait.src = getPortraitPath(fullName);
  portrait.alt = fullName;

  portrait.onerror = function () {
    this.onerror = null;
    this.src = "portraits/placeholder.png";
  };

  const textWrap = document.createElement("div");

  const name = document.createElement("div");
  name.className = "card-name";
  name.textContent = cleanLabel(row["Full Name"] || "Unnamed");

  const sub = document.createElement("div");
  sub.className = "card-sub";
  sub.textContent = [
    cleanLabel(row["Position "]),
    row["Appointing President"]
  ].filter(Boolean).join(" · ");

  textWrap.appendChild(name);
  textWrap.appendChild(sub);

  top.appendChild(portrait);
  top.appendChild(textWrap);
  card.appendChild(top);

  const grid = document.createElement("div");
  grid.className = "card-grid";

  CARD_FIELDS.forEach(field => {
    const raw = row[field];
    if (!raw) return;

    const k = document.createElement("div");
    k.className = "k";
    k.textContent = LABELS[field] || field;

    const v = document.createElement("div");
    v.className = "v";
    v.textContent = cleanLabel(raw);

    if (isMissingValue(raw)) v.classList.add("missing");

    grid.appendChild(k);
    grid.appendChild(v);
  });

  card.appendChild(grid);
  renderCareerSummary(row, card);

  return card;
}

function renderCareerSummary(row, card) {
  CAREER_GROUPS.forEach(group => {
    const active = group.fields.filter(([field]) => isAffirmative(row[field]));
    if (!active.length) return;

    const block = document.createElement("div");
    block.className = "career-block";

    const title = document.createElement("div");
    title.className = "career-title";
    title.textContent = group.label;

    const badges = document.createElement("div");
    badges.className = "career-badges";

    active.forEach(([, label]) => {
      const badge = document.createElement("span");
      badge.className = "career-badge";
      badge.textContent = label;
      badges.appendChild(badge);
    });

    block.appendChild(title);
    block.appendChild(badges);
    card.appendChild(block);
  });
}

function isServedOnCourt(row) {
  const positions = splitInstitutionValues(row["Position "]);

  return positions.some(position => {
    const label = cleanLabel(position).toLowerCase();
    return label === "chief justice" || label === "associate justice";
  });
}

function isBinaryField(field) {
  return CAREER_FIELDS.includes(field) || /\?$/.test(field);
}

function binarySortRank(value) {
  const s = String(value || "").trim().toLowerCase();
  if (["yes", "y", "true", "1", "x"].includes(s)) return 0;
  if (["no", "n", "false", "0"].includes(s)) return 1;
  return 2;
}

function isAffirmative(value) {
  const s = String(value || "").trim().toLowerCase();
  return ["yes", "y", "true", "1", "x"].includes(s);
}

function cleanLabel(value) {
  if (!value) return "";

  return String(value)
    .replace(/^\d+\.\s*/, "")
    .replace(/^ORIGINAL NOMINATION$/i, "Original nomination")
    .trim();
}

function isMissingValue(value) {
  const s = String(value).trim();
  return MISSING_PREFIXES.some(prefix => s.startsWith(prefix + ".") || s === prefix);
}

function toNumber(value, field = "") {
  if (value == null || value === "") return NaN;
  const s = String(value).trim();

  if (
    field === "Years of Service as a justice" ||
    field === "Years of Service as a Justice"
  ) {
    if (!s || /^n\/?a$/i.test(s)) return NaN;
    const currentYear = new Date().getFullYear();

    let match = s.match(/^(\d{4})\s*[-–—]\s*(\d{4})$/);
    if (match) return Number(match[2]) - Number(match[1]);

    match = s.match(/^(\d{4})\s*[-–—]\s*present$/i);
    if (match) return currentYear - Number(match[1]);

    const n = Number(s.replace(/[^\d.-]/g, ""));
    return Number.isFinite(n) ? n : NaN;
  }

  if (field === "Justice's Age at Time of Departure from the Court") {
    if (!s || /^n\/?a$/i.test(s) || /still on the court/i.test(s)) return NaN;
    const match = s.match(/\d+/);
    return match ? Number(match[0]) : NaN;
  }

  if (field === "Year of Death") {
    if (!s || /still alive/i.test(s)) return NaN;
    const match = s.match(/\b\d{4}\b/);
    return match ? Number(match[0]) : NaN;
  }

  const n = Number(s.replace(/[^\d.-]/g, ""));
  return Number.isFinite(n) ? n : NaN;
}
