<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Presidential Justice Appointments Symbol Chart</title>

<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="container">

  <div class="view-toggle">
    <button class="toggle-btn active" type="button" data-view="president">
      By President
    </button>
    <button class="toggle-btn" type="button" data-view="term">
      By Term
    </button>
  </div>

  <div id="title">
    <h1></h1>
  </div>

  <div id="subtitle">
    In chronological order
  </div>

  <div id="chart"></div>

  <div id="footnote" class="footnote"></div>

</div>

<script>

const CONFIGS = {
  president: {
    title: "Number of Justices Appointed by President",
    csvPath: "scotus data prep - appointments by president.csv",
    cols: {
      president: "president",
      appointments: "appointments",
      elevations: "elevations",
      recess: "recess"
    },
    rowClass: "president-row",
    labelWidth: 130,
    parseRow: d => ({
      president: d["president"],
      appointments: +d["appointments"] || 0,
      elevations: +d["elevations"] || 0,
      recess: +d["recess"] || 0
    }),
    prepareData: data => data.map(d => ({ ...d })),
    drawLabels: function(rows) {
      rows.append("text")
        .attr("class", "row-label")
        .attr("x", 0)
        .attr("y", squareSize / 2)
        .text(d => d.president);
    },
    footnote: ""
  },
  term: {
    title: "Number of Justices Appointed by Presidential Term",
    csvPath: "scotus data prep - appointments by term.csv",
    cols: {
      termYears: "term years",
      presidents: "presidents",
      appointments: "appointments",
      elevations: "elevations",
      recess: "recess"
    },
    rowClass: "term-row",
    presidentLabelWidth: 220,
    termLabelWidth: 65,
    get labelWidth() {
      return this.presidentLabelWidth + this.termLabelWidth;
    },
    parseRow: d => ({
      termYears: d["term years"],
      presidents: cleanPresidentName(d["presidents"]),
      appointments: +d["appointments"] || 0,
      elevations: +d["elevations"] || 0,
      recess: +d["recess"] || 0
    }),
    prepareData: data => {
      const prepared = data.map(d => ({ ...d }));

      prepared.forEach((d, i) => {
        d.displayPresident =
          i > 0 && d.presidents === prepared[i - 1].presidents
            ? ""
            : d.presidents;
      });

      return prepared;
    },
    drawLabels: function(rows) {
      rows.append("text")
        .attr("class", "row-label row-president")
        .attr("x", 0)
        .attr("y", squareSize / 2 + 1)
        .text(d => d.displayPresident);

      rows.append("text")
        .attr("class", "row-label row-term-years")
        .attr("x", this.presidentLabelWidth)
        .attr("y", squareSize / 2 + 1)
        .text(d => d.termYears);
    },
    footnote: `<h3>Note:</h3>
  Presidents with no nominations: William H. Harrison, Zachary Taylor, Andrew Johnson, Jimmy Carter
    <br>Recess appointments and elevations:
    <br>George Washington	- Thomas Johnson was appointed in August 1791 and ultimatley confirmed in Nov 1791
<br>John Adams- Bushrod Washington was appointed in Sep 1798 and ultimatley confirmed in Dec 1798; and Alfred Moore appointed Oct 1799 and confirmed Dec 1799
<br>Thomas Jefferson- Henry B. Livingston was appointed in Nov 1806 and ultimatley confirmed in Dec 1806
<br>James Monroe- Smith Thompson was appointed in Sept 1823 and ultimatley confirmed in Dec 1823
<br>Martin Van Buren	- John McKinley was appointed in April 1837 and ultimatley confirmed in Sept 1837
<br>James K. Polk	- Levi Woodbury was appointed in Sept 1845 and ultimatley confirmed in Jan 1846
<br>Millard Fillmore	- Benjamin Curtis was appointed in Sept 1851 and ultimatley confirmed in Dec 1851
<br>Abraham Lincoln- David Davis was appointed in Oct 1862 and ultimatley confirmed in Dec 1862.
<br>Theodore Roosevelt	- Oliver Wendell Holmes was appointed in Aug 1902 and ultimatley confirmed in Dec 1902 [appointed by Roosevelt]
<br>William Howard Taft	-	Associate Justice White elevation to Chief Justice	
<br>Herbert Hoover -	(One of these nominations is Charles Evan Hughes who previously served on the Court)	
<br>Franklin D. Roosevelt	- PLUS Associate Justice Stone elevation to Chief Justice	
<br>Dwight D. Eisenhower - Earl Warren was appointed in Oct 1953 and ultimatley confirmed in March 1954; William Brennan was appointed in Oct 1956 and ultimatley confirmed in March 1957; Potter Stewart was appointed in Oct 1958 and ultimatley confirmed in May 1959
<br>Ronald Reagan - Associate Justice Rehnquist elevation to Chief Justice	`
  }
};

const squareSize = 10;
const squareGap = 4;
const rowGap = 18;

const margin = {
  top: 45,
  right: 10,
  bottom: 20,
  left:0
};

let currentView = "president";
let loadedData = {};

function toTitleCase(str) {
  return String(str || "")
    .toLowerCase()
    .replace(/\b\w/g, c => c.toUpperCase());
}

function cleanPresidentName(str) {
  return toTitleCase(
    String(str || "")
      .replace(/\s*\([^)]*\)/g, "")
      .trim()
  );
}

Promise.all(
  Object.entries(CONFIGS).map(([view, config]) =>
    d3.csv(config.csvPath, config.parseRow).then(data => {
      loadedData[view] = data;
    })
  )
).then(() => {
  setupToggleButtons();
  renderView(currentView);
});

function setupToggleButtons() {
  d3.selectAll(".toggle-btn")
    .on("click", function() {
      const view = d3.select(this).attr("data-view");

      currentView = view;

      d3.selectAll(".toggle-btn")
        .classed("active", false);

      d3.select(this)
        .classed("active", true);

      renderView(currentView);
    });
}

function renderView(view) {
  const config = CONFIGS[view];

  d3.select("#title h1")
    .text(config.title);

  d3.select("#footnote")
    .html(config.footnote);

  d3.select("#footnote")
    .style("display", config.footnote ? null : "none");

  const chart = d3.select("#chart");
  chart.selectAll("*").remove();

  const data = config.prepareData(loadedData[view]);
  const labelWidth = config.labelWidth;

  data.forEach(d => {
    d.symbols = [
      ...Array(d.appointments).fill("appointment"),
      ...Array(d.elevations).fill("elevation"),
      ...Array(d.recess).fill("recess")
    ];

    d.total = d.symbols.length;
    d.totalLabel = `${d.total}`;
  });

  const maxSymbols = d3.max(data, d => d.total) || 0;

  const width =
    margin.left +
    labelWidth +
    maxSymbols * (squareSize + squareGap) +
    260 +
    margin.right;

  const height =
    margin.top +
    data.length * rowGap +
    margin.bottom;

  const svg = chart
    .append("svg")
    .attr("viewBox", `0 0 ${width} ${height}`)
    .attr("height", height);

  drawDefs(svg);
  drawLegend(svg);

  const rows = svg.selectAll(`.${config.rowClass}`)
    .data(data)
    .join("g")
    .attr("class", config.rowClass)
    .attr(
      "transform",
      (d, i) => `translate(${margin.left}, ${margin.top + i * rowGap})`
    );

  config.drawLabels(rows);

  rows.each(function(d) {
    const row = d3.select(this);

    d.symbols.forEach((type, i) => {
      drawSymbol(
        row,
        labelWidth + i * (squareSize + squareGap),
        0,
        type
      );
    });

    row.append("text")
      .attr("class", "row-total")
      .attr(
        "x",
        labelWidth +
        d.total * (squareSize + squareGap)
      )
      .attr("y", squareSize / 2 + 1)
      .text(d => d.totalLabel);
  });
}

function drawDefs(svg) {
  const defs = svg.append("defs");
  const stripes = 4;

  const stripePattern = defs.append("pattern")
    .attr("id", "diagonal-stripes")
    .attr("patternUnits", "userSpaceOnUse")
    .attr("width", stripes)
    .attr("height", stripes)
    .attr("patternTransform", "rotate(45)");

  stripePattern.append("rect")
    .attr("width", stripes)
    .attr("height", stripes)
    .attr("fill", "#fff");

  stripePattern.append("line")
    .attr("x1", 0)
    .attr("y1", 0)
    .attr("x2", 0)
    .attr("y2", stripes)
    .attr("stroke", "#111")
    .attr("stroke-width", 2);
}

function drawLegend(svg) {
  const legend = svg.append("g")
    .attr("class", "legend")
    .attr("transform", `translate(2, 12)`);

  drawSymbol(legend, 0, 0, "appointment");
  legend.append("text")
    .attr("x", 22)
    .attr("y", 7)
    .text("Appointment");

  drawSymbol(legend, 125, 0, "elevation");
  legend.append("text")
    .attr("x", 147)
    .attr("y", 7)
    .text("Elevation");

  drawSymbol(legend, 235, 0, "recess");
  legend.append("text")
    .attr("x", 257)
    .attr("y", 7)
    .text("Recess");
}

function drawSymbol(parent, x, y, type) {
  const g = parent.append("g")
    .attr("transform", `translate(${x}, ${y})`);

  if (type === "appointment") {
    g.append("rect")
      .attr("class", "square")
      .attr("width", squareSize)
      .attr("height", squareSize)
      .attr("fill", "#111");
  }

  if (type === "elevation") {
    g.append("rect")
      .attr("width", squareSize)
      .attr("height", squareSize)
      .attr("fill", "#fff");

    g.append("polygon")
      .attr(
        "points",
        `
        0,0
        ${squareSize},0
        0,${squareSize}
        `
      )
      .attr("fill", "#111");

    g.append("rect")
      .attr("class", "square")
      .attr("width", squareSize)
      .attr("height", squareSize)
      .attr("fill", "none");
  }

  if (type === "recess") {
    g.append("rect")
      .attr("class", "square")
      .attr("width", squareSize)
      .attr("height", squareSize)
      .attr("fill", "url(#diagonal-stripes)");
  }
}

</script>

</body>
</html>
