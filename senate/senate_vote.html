<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diverging Vote Bars</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <link rel="stylesheet" href="senate.css" />
</head>

<body>
  <div class="wrap">
    <section class="hero">
      <h1>Senate Votes</h1>

      <div class="panel">
        <div class="controls">
          <button id="sort-date" class="active" type="button">Date: Early to Late</button>
          <button id="sort-date-desc" type="button">Date: Late to Early</button>
          <button id="sort-partisanship" type="button">Vote Margin: Largest to Smallest</button>
 </div>
     <div class="controls">
          <button id="view-counts" class="active" type="button">Show Counts</button>
          <button id="view-percent" type="button">Show Percent</button>
     </div>
     <div class="controls">
           <button id="filter-confirmed" type="button">Confirmed Only</button>
          <button id="filter-voice" type="button">Hide Voice Votes</button>
          <button id="filter-modern" type="button">Hide Pre-1967</button>
        </div>

        <div class="legend">
          <span class="legend-item">
            <span class="legend-swatch current"></span>
            Current justices
          </span>
        </div>

        <div class="chart-wrap" id="chart"></div>
      </div>
    </section>

    <div class="tooltip" id="tooltip"></div>

    <p class="subhed">
      Source: https://www.senate.gov/legislative/nominations/SupremeCourtNominations1789present.html
    </p>
  </div>

  <script>
    const csvPath = "scotus_nominations_cleaned.csv";

    const HIGHLIGHT_NAMES = new Set([
      "Barrett, Amy Coney",
      "Jackson, Ketanji Brown",
      "Alito, Samuel A., Jr.",
      "Sotomayor, Sonia",
      "Kagan, Elena",
      "Gorsuch, Neil M.",
      "Kavanaugh, Brett",
      "Thomas, Clarence",
      "Roberts, John G., Jr.1"
    ]);

    const RESULT_LABELS = {
      D: "Declined",
      N: "No Action",
      P: "Postponed",
      R: "Rejected",
      W: "Withdrawn",
      CNA: "Confirmed Vote N/A"
    };

    const chartContainer = d3.select("#chart");
    const tooltip = d3.select("#tooltip");

    let allData = [];
    let currentSort = "partisanship";
    let currentView = "percent";

    let confirmedOnly = false;
    let hideVoiceVotes = false;
    let hidePre1967 = true;

    d3.csv(csvPath, d => {
      const voteYear = +String(d["Vote Year"] || "").trim();
      const yeaVotes = +String(d["Yea"] || "").replace(/,/g, "").trim();
      const noVotes = +String(d["Nay"] || "").replace(/,/g, "").trim();
      const justiceName = String(d["Nominee"] || "").trim();
      const totalVotes = yeaVotes + noVotes;
      const resultCode = String(d["Results"] || "").trim().toUpperCase();

      return {
        voteYear,
        yeaVotes,
        noVotes,
        justiceName,
        totalVotes,
        voice: String(d["Voice"] || "").toLowerCase() === "true",
        resultCode,
        statusText:
          resultCode !== "C" && totalVotes === 0
            ? RESULT_LABELS[resultCode] || ""
            : "",
        yeaPct: totalVotes ? (yeaVotes / totalVotes) * 100 : 0,
        noPct: totalVotes ? (noVotes / totalVotes) * 100 : 0,
        margin: Math.abs(yeaVotes - noVotes)
      };
    })
    .then(data => {
      allData = data.filter(d =>
        !isNaN(d.voteYear) &&
        !isNaN(d.yeaVotes) &&
        !isNaN(d.noVotes) &&
        d.justiceName
      );

      setActiveButton();
      updateChart();

      window.addEventListener("resize", updateChart);
    })
    .catch(error => {
      console.error(error);
      chartContainer.html("<p>Could not load CSV.</p>");
    });

    document.getElementById("sort-date").addEventListener("click", () => {
      currentSort = "date-asc";
      setActiveButton();
      updateChart();
    });

    document.getElementById("sort-date-desc").addEventListener("click", () => {
      currentSort = "date-desc";
      setActiveButton();
      updateChart();
    });

    document.getElementById("sort-partisanship").addEventListener("click", () => {
      currentSort = "partisanship";
      setActiveButton();
      updateChart();
    });

    document.getElementById("view-counts").addEventListener("click", () => {
      currentView = "counts";
      setActiveButton();
      updateChart();
    });

    document.getElementById("view-percent").addEventListener("click", () => {
      currentView = "percent";
      setActiveButton();
      updateChart();
    });

    document.getElementById("filter-confirmed").addEventListener("click", () => {
      confirmedOnly = !confirmedOnly;
      setActiveButton();
      updateChart();
    });

    document.getElementById("filter-voice").addEventListener("click", () => {
      hideVoiceVotes = !hideVoiceVotes;
      setActiveButton();
      updateChart();
    });

    document.getElementById("filter-modern").addEventListener("click", () => {
      hidePre1967 = !hidePre1967;
      setActiveButton();
      updateChart();
    });

    function setActiveButton() {
      document.getElementById("sort-date")
        .classList.toggle("active", currentSort === "date-asc");

      document.getElementById("sort-date-desc")
        .classList.toggle("active", currentSort === "date-desc");

      document.getElementById("sort-partisanship")
        .classList.toggle("active", currentSort === "partisanship");

      document.getElementById("view-counts")
        .classList.toggle("active", currentView === "counts");

      document.getElementById("view-percent")
        .classList.toggle("active", currentView === "percent");

      document.getElementById("filter-confirmed")
        .classList.toggle("active", confirmedOnly);

      document.getElementById("filter-voice")
        .classList.toggle("active", hideVoiceVotes);

      document.getElementById("filter-voice").textContent =
        hideVoiceVotes ? "Show Voice Votes" : "Hide Voice Votes";

      document.getElementById("filter-modern")
        .classList.toggle("active", hidePre1967);

      document.getElementById("filter-modern").textContent =
        hidePre1967 ? "Show Pre-1967" : "Hide Pre-1967";
    }

    function getSortedData() {
      let data = [...allData];

      if (confirmedOnly) {
        data = data.filter(d => d.resultCode === "C");
      }

      if (hideVoiceVotes) {
        data = data.filter(d => !d.voice);
      }

      if (hidePre1967) {
        data = data.filter(d => d.voteYear >= 1967);
      }

      if (currentSort === "partisanship") {

        data.sort((a, b) => {
          const diffA = Math.abs(a.yeaPct - a.noPct);
          const diffB = Math.abs(b.yeaPct - b.noPct);

          return d3.descending(diffA, diffB) ||
                 d3.ascending(a.voteYear, b.voteYear);
        });

      } else if (currentSort === "date-desc") {

        data.sort((a, b) =>
          d3.descending(a.voteYear, b.voteYear)
        );

      } else {

        data.sort((a, b) =>
          d3.ascending(a.voteYear, b.voteYear)
        );

      }

      return data;
    }

    function updateChart() {
      renderChart(getSortedData());
    }

    function renderChart(data) {
      chartContainer.html("");

      if (!data.length) {
        chartContainer.append("p").text("No valid rows found.");
        return;
      }

      const wrapWidth = chartContainer.node().clientWidth || 1200;

      const rowHeight = 20;
      const fontSizeName = 12;
      const fontSizeYear = 12;
      const fontSizeValue = 11;

      const maxNameLength =
        d3.max(data, d => d.justiceName.length) || 10;

      const leftLabelWidth =
        Math.max(180, Math.min(340, maxNameLength * 7.2));

      const rightLabelWidth = 120;

      const margin = {
        top: 62,
        right: rightLabelWidth,
        bottom: 28,
        left: leftLabelWidth
      };

      const width = Math.max(760, wrapWidth);

      const height =
        margin.top +
        margin.bottom +
        data.length * rowHeight;

      const maxValue =
        currentView === "percent"
          ? 100
          : d3.max(data, d => Math.max(d.yeaVotes, d.noVotes));

      const x = d3.scaleLinear()
        .domain([-maxValue, maxValue])
        .range([margin.left * 1.2, width - margin.right]);

      const y = d3.scaleBand()
        .domain(data.map((d, i) => i))
        .range([margin.top + 18, height - margin.bottom])
        .padding(0.30);

      const svg = chartContainer
        .append("svg")
        .attr("width", width)
        .attr("height", height);

      const xAxis = d3.axisTop(x)
        .tickFormat(d => {
          const v = Math.abs(d);
          return currentView === "percent"
            ? `${v}%`
            : v;
        });

      svg.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${margin.top})`)
        .call(xAxis);

      svg.append("line")
        .attr("class", "center-line")
        .attr("x1", x(0))
        .attr("x2", x(0))
        .attr("y1", margin.top + 18)
        .attr("y2", height - margin.bottom);

      svg.append("text")
        .attr("class", "axis-title")
        .attr("x", x(-maxValue / 2))
        .attr("y", margin.top - 18)
        .attr("text-anchor", "middle")
        .text(
          currentView === "percent"
            ? "Yea %"
            : "Yea Votes"
        );

      svg.append("text")
        .attr("class", "axis-title")
        .attr("x", x(maxValue / 2))
        .attr("y", margin.top - 18)
        .attr("text-anchor", "middle")
        .text(
          currentView === "percent"
            ? "No %"
            : "No Votes"
        );

      svg.selectAll(".name-label")
        .data(data)
        .join("text")
        .attr(
          "class",
          d =>
            HIGHLIGHT_NAMES.has(d.justiceName)
              ? "name-label highlight"
              : "name-label"
        )
        .attr("x", margin.left - 14)
        .attr("y", (_, i) => y(i) + y.bandwidth() / 2)
        .attr("text-anchor", "end")
        .style("font-size", `${fontSizeName}px`)
        .text(d => d.justiceName);

      svg.selectAll(".year-label")
        .data(data)
        .join("text")
        .attr("class", "year-label")
        .attr("x", width - margin.right + 12)
        .attr("y", (_, i) => y(i) + y.bandwidth() / 2)
        .attr("text-anchor", "start")
        .style("font-size", `${fontSizeYear}px`)
        .text(d => `${d.voteYear}`);

      svg.selectAll(".bar-yea")
        .data(data.filter(d => !d.voice && !d.statusText))
        .join("rect")
        .attr(
          "class",
          d =>
            HIGHLIGHT_NAMES.has(d.justiceName)
              ? "bar-yea highlight"
              : "bar-yea"
        )
        .attr("x", d => {
          const value =
            currentView === "percent"
              ? d.yeaPct
              : d.yeaVotes;

          return x(-value);
        })
        .attr("y", d => y(data.indexOf(d)))
        .attr("width", d => {
          const value =
            currentView === "percent"
              ? d.yeaPct
              : d.yeaVotes;

          return x(0) - x(-value);
        })
        .attr("height", y.bandwidth())
        .on("mousemove", (event, d) => {
          showTooltip(
            event,
            d,
            currentView === "percent"
              ? "Yea %"
              : "Yea Votes",
            currentView === "percent"
              ? `${d.yeaPct.toFixed(1)}%`
              : d.yeaVotes
          );
        })
        .on("mouseleave", hideTooltip);

      svg.selectAll(".bar-no")
        .data(data.filter(d => !d.voice && !d.statusText))
        .join("rect")
        .attr(
          "class",
          d =>
            HIGHLIGHT_NAMES.has(d.justiceName)
              ? "bar-no highlight"
              : "bar-no"
        )
        .attr("x", x(0))
        .attr("y", d => y(data.indexOf(d)))
        .attr("width", d => {
          const value =
            currentView === "percent"
              ? d.noPct
              : d.noVotes;

          return x(value) - x(0);
        })
        .attr("height", y.bandwidth())
        .on("mousemove", (event, d) => {
          showTooltip(
            event,
            d,
            currentView === "percent"
              ? "No %"
              : "No Votes",
            currentView === "percent"
              ? `${d.noPct.toFixed(1)}%`
              : d.noVotes
          );
        })
        .on("mouseleave", hideTooltip);

      svg.selectAll(".yea-label")
        .data(data.filter(d => !d.voice && !d.statusText))
        .join("text")
        .attr("class", "value-label")
        .attr("x", d => {
          const value =
            currentView === "percent"
              ? d.yeaPct
              : d.yeaVotes;

          return x(-value) - 6;
        })
        .attr("y", d => y(data.indexOf(d)) + y.bandwidth() / 2)
        .attr("text-anchor", "end")
        .style("font-size", `${fontSizeValue}px`)
        .text(d =>
          currentView === "percent"
            ? `${d.yeaPct.toFixed(1)}%`
            : d.yeaVotes
        );

      svg.selectAll(".no-label")
        .data(data.filter(d => !d.voice && !d.statusText))
        .join("text")
        .attr("class", "value-label")
        .attr("x", d => {
          const value =
            currentView === "percent"
              ? d.noPct
              : d.noVotes;

          return x(value) + 6;
        })
        .attr("y", d => y(data.indexOf(d)) + y.bandwidth() / 2)
        .attr("text-anchor", "start")
        .style("font-size", `${fontSizeValue}px`)
        .text(d =>
          currentView === "percent"
            ? `${d.noPct.toFixed(1)}%`
            : d.noVotes
        );

      svg.selectAll(".voice-label")
        .data(data.filter(d => d.voice || d.statusText))
        .join("text")
        .attr("class", "voice-label")
        .attr("x", x(0) - 10)
        .attr("y", d => y(data.indexOf(d)) + y.bandwidth() / 2)
        .attr("text-anchor", "end")
        .style("font-size", `${fontSizeValue + 1}px`)
        .style("font-weight", "600")
        .text(d =>
          d.voice
            ? "Voice"
            : d.statusText
        );
    }

    function showTooltip(event, d, label, value) {
      tooltip
        .style("opacity", 1)
        .style("left", `${event.pageX}px`)
        .style("top", `${event.pageY}px`)
        .html(
          `<strong>${d.justiceName}</strong><br>` +
          `Vote Year: ${d.voteYear}<br>` +
          `Margin: ${d.margin}<br>` +
          `${label}: ${value}`
        );
    }

    function hideTooltip() {
      tooltip.style("opacity", 0);
    }
  </script>
</body>
</html>
